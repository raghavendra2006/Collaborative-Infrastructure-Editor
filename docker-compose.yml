version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-editor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-editor_pass}
      POSTGRES_DB: ${POSTGRES_DB:-infra_editor}
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-editor} -d ${POSTGRES_DB:-infra_editor}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-editor}:${POSTGRES_PASSWORD:-editor_pass}@db:5432/${POSTGRES_DB:-infra_editor}
      - APP_PORT=${APP_PORT:-8080}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3
